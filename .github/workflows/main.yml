name: Robo do Gilvan
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install requests
      - run: python main.py
      - name: Salvar Arquivo
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add ml
