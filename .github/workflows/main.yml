name: Robo-Gilvan

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Rodar Robo
        run: |
          pip install requests
          python main.py
      - name: Salvar
        run: |
          git config --global user.name "Gilvan"
          git config --global user.email "gilvan@example.com"
          git add .
          git commit -m "update" || exit 0
          git push