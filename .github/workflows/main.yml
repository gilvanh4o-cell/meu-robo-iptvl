name: Robo-Gilvan-IPTV

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *' # Roda a cada 4 horas automaticamente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Executar Robo
        run: python main.py
      - name: Salvar Arquivo
        run: |
          git config --global user.name "Gilvan"
          git config --global user.email "gilvan@exemplo.com"
          git add .
          git commit -m "Lista atualizada" || exit 0
          git push
